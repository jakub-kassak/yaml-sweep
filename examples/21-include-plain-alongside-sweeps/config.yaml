# 21-include-plain-alongside-sweeps: The outer config declares scope
# `a` and sweeps `x`. The included `inner.yaml` is plain YAML with no
# zip markers, so it does not cross the include zip-boundary. The
# include is spliced verbatim into each of the 2 variants generated by
# `!zip_a` on `x`.
!key a:
x: !zip_a [1, 2]
items:
  - !include inner.yaml
