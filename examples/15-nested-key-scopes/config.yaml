# 15-nested-key-scopes: Nested named scopes `model` (outer) and `eval`
# (inner, scoped to the first experiment only).
# - `model` links `model`/`temp` in experiment 1 and `model`/`endpoint`
#   in experiment 2 -> 2 variants across the whole `experiments` array.
# - `eval` is declared only inside the first experiment, so it links
#   `name`/`metric`/`shots` within `benchmarks` -> 3 variants nested
#   inside each `model` variant of experiment 1.
# Experiment 2 has no `eval` scope and contributes plain fields
# (`task`, `max_tokens`) alongside its `model` sweep.
!key model:
experiments:
  - model: !zip_model [gpt4, claude]
    temp: !zip_model [0.0, 0.7]
    !key eval:
    benchmarks:
      - name: !zip_eval [mmlu, gsm8k, humaneval]
        metric: !zip_eval [accuracy, exact_match, pass_at_1]
      - shots: !zip_eval [5, 8, 0]
  - model: !zip_model [gpt4, claude]
    endpoint: !zip_model [/v1/chat, /v1/messages]
    task: safety_eval
    max_tokens: 512
