name: yaml-sweep
version: 0.1.0.0
synopsis: YAML configuration engine with sweep expansion, file inclusion, and inheritance
description:
  A generic YAML processor that supports custom tags for file inclusion
  (`!include`), inheritance with deep-merge (`!inherit`), cartesian-product
  sweeps (`!prod`), `!key <name>` scope declarations, and index-linked sweeps
  (`!zip_<name>`).
  .
  The entry point is `Yaml.Sweep.loadConfigValue`, which reads a YAML file,
  resolves all custom tags, expands all sweep points, and returns one
  `Data.YAML.Node Pos` per resulting configuration variant.
  .
  See the `README.md` for usage examples and the `CHANGELOG.md` for revision
  history.
category: Configuration, Data, YAML
author: AgentDojo Team
maintainer: team@agentdojo.dev
copyright: Copyright (c) 2025 Jakub Kaššák
license: BSD-3-Clause
github: agentdojo/yaml-sweep
extra-doc-files:
  - README.md
  - CHANGELOG.md
extra-source-files:
  - README.md
  - LICENSE
  - cabal.project
  - Setup.hs
  - hie.yaml
  - package.yaml
  - demo.yaml
  - demo2.yaml
  - demo3.yaml
  - demo3.result.yaml
  - demo4.yaml
  - docs/test-10-nested-bfs.md
verbatim:
  cabal-version: 3.0

flags:
  dev-warnings:
    description: Enable -Werror during development (toggled by `cabal configure -f dev-warnings`).
    manual: true
    default: false

dependencies:
  - name: base
    version: '>= 4.7 && < 5'
    mixin:
      - hiding (Prelude)
  - name: relude
    version: '>= 1.2 && < 1.3'
    mixin:
      - (Relude as Prelude)
  - bytestring >= 0.11 && < 0.13
  - containers >= 0.6 && < 0.8
  - deepseq >= 1.4 && < 1.6
  - directory >= 1.3 && < 1.4
  - filepath >= 1.4 && < 1.6
  - HsYAML >= 0.2 && < 0.3
  - mtl >= 2.2 && < 2.4
  - string-interpolate >= 0.3 && < 0.4
  - text >= 1.2 && < 2.2
  - transformers >= 0.5 && < 0.7

library:
  source-dirs:
    - src
  ghc-options:
    - -Wall
    - -O2
  exposed-modules:
    - Yaml.Sweep
    - Yaml.Sweep.Types
    - Yaml.Sweep.Loader
    - Yaml.Sweep.Parser
    - Yaml.Sweep.Expander
  when:
    - condition: flag(dev-warnings)
      ghc-options:
        - -Werror

tests:
  yaml-sweep-test:
    main: Spec.hs
    source-dirs:
      - test
    dependencies:
      - yaml-sweep
      - hspec >= 2.0 && < 2.12
      - temporary >= 1.3 && < 1.4
      - directory >= 1.3 && < 1.4
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
      - -Wall
      - -O2
    when:
      - condition: flag(dev-warnings)
        ghc-options:
          - -Werror

language: GHC2021

default-extensions:
  - OverloadedStrings
  - DataKinds
  - QuasiQuotes
  - ViewPatterns
  - BlockArguments
  - MultiWayIf
  - OverloadedRecordDot
  - RecordWildCards
  - TypeFamilies
  - LambdaCase
  - StrictData

executables:
  yaml-sweep-cli:
    main: Main.hs
    source-dirs: app
    dependencies:
      - yaml-sweep
